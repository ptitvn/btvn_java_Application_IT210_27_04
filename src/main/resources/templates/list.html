<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{list.title}">Danh sách công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<!-- Tiêu đề -->
<h2 class="mb-3" th:text="#{list.title}">Danh sách công việc</h2>
<p class="fw-bold" th:text="|#{list.owner}: ${ownerName}|">Danh sách của: Chủ sở hữu</p>

<!-- Nút chuyển ngôn ngữ -->
<div class="mb-3">
    <a href="?lang=vi" class="btn btn-outline-secondary">🇻🇳 Tiếng Việt</a>
    <a href="?lang=en" class="btn btn-outline-secondary">🇬🇧 English</a>
</div>

<!-- Thông báo Flash -->
<div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

<!-- Nút thêm mới -->
<a th:href="@{/add}" class="btn btn-primary mb-3" th:text="#{form.add}">Thêm mới</a>

<!-- Bảng danh sách -->
<table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th th:text="#{table.id}">ID</th>
        <th th:text="#{table.content}">Nội dung</th>
        <th th:text="#{table.dueDate}">Ngày hết hạn</th>
        <th th:text="#{table.status}">Trạng thái</th>
        <th th:text="#{table.priority}">Độ ưu tiên</th>
        <th th:text="#{table.action}">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${todo.dueDate}"></td>

        <!-- Trạng thái - tách th:text và th:class riêng, dùng th:switch -->
        <td>
            <span th:class="${todo.status.name() == 'COMPLETED' ? 'badge bg-success' :
                             (todo.status.name() == 'IN_PROGRESS' ? 'badge bg-warning text-dark' :
                             'badge bg-secondary')}">
                <th:block th:switch="${todo.status.name()}">
                    <span th:case="'NOT_STARTED'" th:text="#{form.status.notStarted}"></span>
                    <span th:case="'IN_PROGRESS'" th:text="#{form.status.inProgress}"></span>
                    <span th:case="'COMPLETED'" th:text="#{form.status.completed}"></span>
                </th:block>
            </span>
        </td>

        <!-- Độ ưu tiên - tách th:text và th:class riêng, dùng th:switch -->
        <td>
            <span th:class="${todo.priority.name() == 'HIGH' ? 'badge bg-danger' :
                             (todo.priority.name() == 'MEDIUM' ? 'badge bg-info text-dark' :
                             'badge bg-light text-dark')}">
                <th:block th:switch="${todo.priority.name()}">
                    <span th:case="'LOW'" th:text="#{form.priority.low}"></span>
                    <span th:case="'MEDIUM'" th:text="#{form.priority.medium}"></span>
                    <span th:case="'HIGH'" th:text="#{form.priority.high}"></span>
                </th:block>
            </span>
        </td>

        <td>
            <a th:href="@{/edit/{id}(id=${todo.id})}"
               class="btn btn-sm btn-outline-primary"
               th:text="#{button.edit}">Sửa</a>
            <a th:href="@{/delete/{id}(id=${todo.id})}"
               class="btn btn-sm btn-outline-danger"
               th:onclick="'return confirm(\'' + #{confirm.delete} + '\')'"
               th:text="#{button.delete}">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
