<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{form.title}">Thêm/Sửa công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4" th:text="#{form.title}">Thêm hoặc Sửa công việc</h2>

<form th:action="@{/save}" th:object="${todo}" method="post" class="row g-3">
    <input type="hidden" th:field="*{id}">

    <!-- Nội dung -->
    <div class="col-12">
        <label class="form-label" th:text="#{form.content}">Nội dung:</label>
        <input type="text" th:field="*{content}" class="form-control">
        <div class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
    </div>

    <!-- Ngày hết hạn -->
    <div class="col-md-6">
        <label class="form-label" th:text="#{form.dueDate}">Ngày hết hạn:</label>
        <input type="date" th:field="*{dueDate}" class="form-control">
        <div class="text-danger" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
    </div>

    <!-- Trạng thái -->
    <div class="col-md-6">
        <label class="form-label" th:text="#{form.status}">Trạng thái:</label>
        <select th:field="*{status}" class="form-select">
            <option value="" th:text="#{form.status.select}">-- Chọn trạng thái --</option>
            <option value="NOT_STARTED" th:text="#{form.status.notStarted}">Chưa làm</option>
            <option value="IN_PROGRESS" th:text="#{form.status.inProgress}">Đang làm</option>
            <option value="COMPLETED" th:text="#{form.status.completed}">Hoàn thành</option>
        </select>
        <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
    </div>

    <!-- Độ ưu tiên -->
    <div class="col-md-6">
        <label class="form-label" th:text="#{form.priority}">Độ ưu tiên:</label>
        <select th:field="*{priority}" class="form-select">
            <option value="" th:text="#{form.priority.select}">-- Chọn độ ưu tiên --</option>
            <option value="LOW" th:text="#{form.priority.low}">Thấp</option>
            <option value="MEDIUM" th:text="#{form.priority.medium}">Trung bình</option>
            <option value="HIGH" th:text="#{form.priority.high}">Cao</option>
        </select>
        <div class="text-danger" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
    </div>

    <!-- Nút -->
    <div class="col-12">
        <button type="submit" class="btn btn-success" th:text="#{form.save}">Lưu</button>
        <a th:href="@{/}" class="btn btn-secondary" th:text="#{form.back}">Quay lại danh sách</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
