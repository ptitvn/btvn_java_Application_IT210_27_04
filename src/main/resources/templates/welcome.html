<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{welcome.title}">Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 th:text="#{welcome.header}">Enter Owner Name</h2>

<form th:action="@{/welcome}" method="post" class="mt-3">
  <div class="mb-3">
    <label class="form-label" th:text="#{welcome.label}">Your Name:</label>

    <input type="text" name="ownerName"
           th:classappend="${error != null} ? 'is-invalid'"
           class="form-control">

    <div class="invalid-feedback d-block text-danger fw-semibold"
         th:if="${error}"
         th:text="${error}">
    </div>
  </div>

  <button type="submit" class="btn btn-primary" th:text="#{welcome.button}">Bắt đầu</button>
</form>

<!-- Nút chuyển ngôn ngữ -->
<div class="mt-3">
  <a href="?lang=vi" class="btn btn-outline-secondary">🇻🇳 Tiếng Việt</a>
  <a href="?lang=en" class="btn btn-outline-secondary">🇬🇧 English</a>
</div>

</body>
</html>
